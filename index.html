<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Port Base Colors Editor</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div>
          <h1>Port Base Colors Editor</h1>
        </div>

        <div class="toolbar">
          <button id="copyJsonBtn">Copy</button>
          <button id="resetBtn">Reset</button>
          <button id="downloadJsonBtn" class="btn-primary">Download</button>
        </div>
      </div>

      <div class="panel">
        <div id="helpBox" class="help-box">
          <!-- <div class="help-title">What you can do</div> -->
          <ul>
            <li>Drag and drop port cards to reorder them.</li>
            <li>Click a port color box to change the base color.</li>
          </ul>
        </div>

        <div id="addPortForm" class="add-form">
          <div class="field">
            <label for="newPortCode">Port Code</label>
            <input
              id="newPortCode"
              type="text"
              maxlength="5"
              placeholder="BEANR" />
          </div>

          <div class="field">
            <label for="newPortName">Port Name</label>
            <input id="newPortName" type="text" placeholder="Antwerp" />
          </div>

          <div class="field">
            <label for="newPortColor">Color</label>
            <input id="newPortColor" type="color" value="#3b82f6" />
          </div>

          <button id="addPortBtn" class="btn-success">Add Port</button>
        </div>

        <div id="portsGrid" class="grid"></div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <div id="compareModal" class="modal is-hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-compare></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="compareTitle">
        <div class="modal-header">
          <h2 id="compareTitle">Compare</h2>
          <button id="closeCompareBtn" type="button">Close</button>
        </div>
        <div id="compareBody" class="modal-body"></div>
      </div>
    </div>

    <div id="deleteConfirmModal" class="modal is-hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-delete-confirm></div>
      <div
        class="modal-dialog confirm-modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="deleteConfirmTitle">
        <div class="modal-header">
          <h2 id="deleteConfirmTitle">Delete Port</h2>
          <button id="closeDeleteConfirmBtn" type="button">Close</button>
        </div>
        <div class="modal-body">
          <p id="deleteConfirmMessage" class="confirm-message"></p>
          <div class="confirm-actions">
            <button id="cancelDeleteBtn" type="button">Cancel</button>
            <button id="confirmDeleteBtn" type="button" class="btn-danger">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://menus.blob.core.windows.net/shared/utils/logs.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/color.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
